# 在 npmjs.com 创建 Automation / Granular access token，
# 在仓库 Settings -> Secrets and variables -> Actions 中添加 NPM_TOKEN。
# 本 workflow 只负责发布本地 release 脚本推送的 v* tag。
name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Prepare executable
        run: chmod +x packages/cli/dist/cli.js

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
